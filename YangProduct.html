<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Yang Market — Will Robinson Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Short-form promotional video for Yang Market highlighting breakfast offerings and neighborhood presence. Produced by Will Robinson."
    />
    <link rel="icon" type="image/png" href="imgs/willlogo.png" />

    <style>
      :root {
        --brand: #d35400;
        --text: #000;
        --bg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Inter, system-ui, sans-serif;
        line-height: 1.6;
      }

      /* Back link outside content margin */
      .back-outside {
        position: fixed;
        top: 32px;
        left: 24px;
        font-weight: 700;
        color: var(--brand);
        text-decoration: none;
        white-space: nowrap;
        z-index: 10;
      }

      .page {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 5%;
        position: relative;
      }

      header.site {
        font-size: 22px;
        font-weight: 800;
        color: var(--brand);
        margin-bottom: 22px;
        letter-spacing: 0.2px;
        text-align: left;
      }

      h1 {
        font-size: clamp(26px, 4.5vw, 36px);
        line-height: 1.2;
        margin: 6px 0 12px;
      }

      p.lead {
        font-size: 18px;
        margin: 0 0 14px;
        max-width: 72ch;
      }

      p.meta {
        margin: 0 0 18px;
        font-size: 16px;
      }

      /* Video section — UNCHANGED */
      .video-wrapper {
        display: flex;
        justify-content: center;
        margin: 16px 0 6px;
      }

      .video-frame {
        width: 32%;
        max-width: 320px;
      }

      .video-frame video {
        display: block;
        width: 100%;
        height: auto;
        border: none;
        background: transparent;
      }

      @media (max-width: 900px) {
        .back-outside {
          left: 16px;
        }
      }

      @media (max-width: 600px) {
        .page {
          padding: 22px 5%;
        }

        .video-frame {
          width: 100%;
        }

        .back-outside {
          top: 18px;
          left: 16px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Back link OUTSIDE the page margin -->
    <a href="index.html" class="back-outside" aria-label="Back to portfolio">
      ← Back
    </a>

    <div class="page">
      <header class="site">Will Robinson Portfolio</header>

      <h1>Yang Market — Breakfast Ad</h1>

      <p class="lead">
        Short-form promotional video highlighting Yang Market’s breakfast menu
        and morning service, reinforcing the store’s role as a neighborhood
        staple.
      </p>

      <p class="meta"><strong>Role:</strong> Producer, Shooter, Editor</p>

      <div class="video-wrapper">
        <div class="video-frame">
          <video
            autoplay
            muted
            controls
            playsinline
            preload="metadata"
            poster="imgs/Yangquickadthumb.png"
          >
            <source src="imgs/Yang Quick Ad.mp4" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>
      </div>
    </div>
  </body>
</html>
