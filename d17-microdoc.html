<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>D17 RLRT Micro Doc — Will Robinson Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Micro documentary for D17 running brand and community event. By Will Robinson."
    />
    <link rel="icon" type="image/png" href="imgs/willlogo.png" />
    <meta name="theme-color" content="#ffffff" />

    <style>
      :root {
        --brand: #d35400;
        --text: #000;
        --bg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Inter, system-ui, sans-serif;
        line-height: 1.6;
      }

      /* Back link outside content margin */
      .back-outside {
        position: fixed;
        top: 32px;
        left: 24px;
        font-weight: 700;
        color: var(--brand);
        text-decoration: none;
        white-space: nowrap;
        z-index: 10;
      }

      .page {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 5%;
        height: 100%;
      }

      header.site {
        font-size: 22px;
        font-weight: 800;
        color: var(--brand);
        margin-bottom: 22px;
        letter-spacing: 0.2px;
      }

      h1 {
        font-size: clamp(26px, 4.5vw, 36px);
        line-height: 1.2;
        margin: 6px 0 12px;
      }

      p.lead {
        font-size: 18px;
        margin: 0 0 18px;
        max-width: 72ch;
      }

      /* Centered video — UNCHANGED */
      .video-wrapper {
        display: flex;
        justify-content: center;
        margin: 28px 0 0;
      }

      .video-frame {
        width: clamp(260px, 48vh, 640px);
      }

      .video-frame video {
        display: block;
        width: 100%;
        height: auto;
        max-height: 90vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
      }

      @media (max-width: 900px) {
        .page {
          padding: 28px 5%;
        }
        .back-outside {
          left: 16px;
          top: 24px;
        }
      }

      @media (max-width: 600px) {
        .page {
          padding: 22px 5%;
        }
        .back-outside {
          left: 16px;
          top: 18px;
        }
        .video-frame {
          width: 100%;
        }
        .video-frame video {
          max-height: 82vh;
        }
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back-outside" aria-label="Back to portfolio">
      ← Back
    </a>

    <div class="page">
      <header class="site">Will Robinson Portfolio</header>

      <h1>D17 RLRT Micro Doc</h1>

      <p class="lead">
        Short-form micro documentary capturing D17’s running brand and community
        event, blending lifestyle visuals, interviews, and kinetic pacing that
        reflect the brand’s culture and energy.
      </p>
      <p class="meta"><strong>Role:</strong> Director, Shooter, Editor</p>
      <div class="video-wrapper">
        <div class="video-frame">
          <video
            autoplay
            muted
            controls
            playsinline
            preload="metadata"
            poster="imgs/d17-thumb.jpg"
          >
            <source src="imgs/D17 RLRT Micro Doc.mp4" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>
      </div>
    </div>
  </body>
</html>
