<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FHWA Senator Pete Video — Will Robinson Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Event recap for FHWA highlighting U.S. Transportation Secretary Pete Buttigieg’s visit to TFHRC."
    />
    <link rel="icon" type="image/png" href="imgs/willlogo.png" />
    <meta name="theme-color" content="#ffffff" />

    <style>
      :root {
        --brand: #d35400;
        --text: #000;
        --muted: rgba(0, 0, 0, 0.7);
        --bg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Inter, system-ui, sans-serif;
        line-height: 1.6;
      }

      .back-outside {
        position: fixed;
        top: 32px;
        left: 24px;
        font-weight: 700;
        color: var(--brand);
        text-decoration: none;
        white-space: nowrap;
        z-index: 10;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 5%;
        height: 100%;
      }

      header.site {
        font-size: 22px;
        font-weight: 800;
        color: var(--brand);
        margin-bottom: 22px;
        letter-spacing: 0.2px;
        text-align: left;
      }

      h1 {
        font-size: clamp(24px, 4.5vw, 36px);
        line-height: 1.2;
        margin: 6px 0 12px;
      }

      p.lead {
        font-size: 18px;
        color: var(--muted);
        margin: 0 0 16px;
        max-width: 72ch;
      }

      p.meta {
        margin: 0 0 18px;
      }

      .video-wrapper {
        width: 100%;
        max-width: 920px;
        margin: 16px auto 0;
      }

      .video-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
      }

      .video-container iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 900px) {
        .container {
          padding: 28px 5%;
        }
        .back-outside {
          left: 16px;
          top: 24px;
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 22px 5%;
        }
        .back-outside {
          left: 16px;
          top: 18px;
        }
      }
    </style>
  </head>

  <body>
    <a class="back-outside" href="index.html" aria-label="Back to portfolio">
      ← Back
    </a>

    <div class="container">
      <header class="site">Will Robinson Portfolio</header>

      <h1>Federal Highway Administration Senator Pete Video</h1>

      <p class="lead">
        Event recap documenting U.S. Transportation Secretary Pete Buttigieg’s
        visit to the Turner-Fairbank Highway Research Center, including facility
        highlights and demonstrations.
      </p>

      <p class="meta"><strong>Role:</strong> Co-Shooter, Editor, Captions</p>

      <div class="video-wrapper">
        <div class="video-container">
          <iframe
            src="https://www.youtube.com/embed/W7GgylNmCI4"
            title="YouTube video player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>
  </body>
</html>
