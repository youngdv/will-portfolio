<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Arc'teryx — Will Robinson Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Arc'teryx A Mile In My Shoes community initiative recap. Produced, shot, and edited by Will Robinson."
    />
    <link rel="icon" type="image/png" href="imgs/willlogo.png" />
    <meta name="theme-color" content="#ffffff" />

    <style>
      :root {
        --brand: #d35400;
        --text: #000;
        --muted: rgba(0, 0, 0, 0.7);
        --bg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      /* Back link outside content margin */
      .back-outside {
        position: fixed;
        top: 32px;
        left: 24px;
        font-weight: 700;
        color: var(--brand);
        text-decoration: none;
        white-space: nowrap;
        z-index: 10;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 5%;
        height: 100%;
      }

      header.site {
        font-size: 22px;
        font-weight: 800;
        color: var(--brand);
        margin-bottom: 22px;
      }

      h1 {
        font-size: clamp(24px, 4.5vw, 36px);
        line-height: 1.2;
        margin: 6px 0 12px;
      }

      p.lead {
        font-size: 18px;
        color: var(--muted);
        margin: 0 0 14px;
        max-width: 72ch;
      }

      p.meta {
        margin: 0 0 18px;
      }

      /* SAME VISUAL SIZE AS YANG — unchanged */
      .media-well {
        width: 100%;
        max-width: 350px;
        aspect-ratio: 4 / 5;
        margin: 24px auto 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .media-well iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      @media (max-width: 900px) {
        .container {
          padding: 28px 5%;
        }
        .back-outside {
          left: 16px;
          top: 24px;
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 22px 5%;
        }
        .back-outside {
          left: 16px;
          top: 18px;
        }
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back-outside" aria-label="Back to portfolio">
      ← Back
    </a>

    <div class="container">
      <header class="site">Will Robinson Portfolio</header>

      <h1>Arc’teryx Community Initiative — A Mile In My Shoes</h1>

      <p class="lead">
        Community initiative recap produced for Arc’teryx Washington DC,
        highlighting local partnerships and authentic brand engagement.
      </p>

      <p class="meta"><strong>Role:</strong> Producer, Shooter, Editor</p>

      <div class="media-well">
        <iframe
          src="https://player.vimeo.com/video/1109147986?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479&amp;autoplay=1"
          frameborder="0"
          allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          title="The Mile In My Shoe Recap"
        ></iframe>
      </div>
    </div>
  </body>
</html>
