<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Yang Market — Will Robinson Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Narrative-style commercial for Yang Market featuring an owner interview and cinematic b-roll. Produced by Will Robinson."
    />
    <link rel="icon" type="image/png" href="imgs/willlogo.png" />
    <meta name="theme-color" content="#ffffff" />

    <style>
      :root {
        --brand: #d35400;
        --text: #000;
        --muted: rgba(0, 0, 0, 0.7);
        --line: rgba(0, 0, 0, 0.08);
        --bg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      /* Back link outside content margin */
      .back-outside {
        position: fixed;
        top: 32px;
        left: 24px;
        font-weight: 700;
        color: var(--brand);
        text-decoration: none;
        white-space: nowrap;
        z-index: 10;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 5%;
      }

      header.site {
        font-size: 22px;
        font-weight: 800;
        color: var(--brand);
        margin-bottom: 22px;
        letter-spacing: 0.2px;
        text-align: left;
      }

      h1 {
        font-size: clamp(26px, 4.5vw, 36px);
        line-height: 1.2;
        margin: 6px 0 10px;
      }

      p.lead {
        font-size: 18px;
        color: var(--muted);
        margin: 0 0 14px;
        max-width: 72ch;
      }

      p.meta {
        margin: 0 0 18px;
        font-size: 16px;
      }

      /* Media well — UNCHANGED */
      .media-well {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #f8f8f8;
        border: 1px solid var(--line);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 10px;
        margin: 18px 0 10px;
      }

      .media-well video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 8px;
        display: block;
      }

      @media (max-width: 900px) {
        .container {
          padding: 28px 5%;
        }
        .back-outside {
          left: 16px;
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 18px 5%;
        }
        .back-outside {
          top: 18px;
          left: 16px;
        }
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back-outside" aria-label="Back to portfolio">
      ← Back
    </a>

    <div class="container">
      <header class="site">Will Robinson Portfolio</header>

      <h1>Yang Market — Narrative Commercial</h1>

      <p class="lead">
        Narrative-driven commercial for a neighborhood grocery store, combining
        cinematic b-roll with an owner interview to highlight community,
        culture, and personal service.
      </p>

      <p class="meta"><strong>Role:</strong> Producer, Shooter, Editor</p>

      <div class="media-well" aria-label="Yang Market commercial">
        <video
          autoplay
          muted
          controls
          preload="metadata"
          playsinline
          poster="imgs/yangs-thumb.jpg"
          aria-label="Yang Market commercial"
        >
          <source src="imgs/Yang 4k Final (1).mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>
    </div>
  </body>
</html>
