<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Public Roads Magazine — Will Robinson Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Editorial video highlighting the Federal Highway Administration’s Public Roads magazine and its focus on future transportation and STEM careers. Edited by Will Robinson."
    />
    <link rel="icon" type="image/png" href="imgs/willlogo.png" />

    <style>
      :root {
        --brand: #d35400;
        --text: #000;
        --muted: rgba(0, 0, 0, 0.7);
        --bg: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      /* Back link outside content margin */
      .back-outside {
        position: fixed;
        top: 32px;
        left: 24px;
        font-weight: 700;
        color: var(--brand);
        text-decoration: none;
        white-space: nowrap;
        z-index: 10;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 40px 5%;
      }

      header.site {
        font-size: 22px;
        font-weight: 800;
        color: var(--brand);
        margin-bottom: 22px;
        letter-spacing: 0.2px;
        text-align: left;
      }

      h1 {
        font-size: clamp(26px, 4.5vw, 36px);
        line-height: 1.2;
        margin: 6px 0 10px;
      }

      p.lead {
        font-size: 18px;
        color: var(--muted);
        margin: 0 0 14px;
        max-width: 72ch;
      }

      p.meta {
        margin: 0 0 18px;
        font-size: 16px;
      }

      /* Video embed — preserved layout */
      .video-wrapper {
        max-width: 920px;
        margin: 24px auto 0;
      }

      .video-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
      }

      .video-container iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      @media (max-width: 900px) {
        .container {
          padding: 28px 5%;
        }
        .back-outside {
          left: 16px;
        }
      }

      @media (max-width: 600px) {
        .container {
          padding: 18px 5%;
        }
        .back-outside {
          top: 18px;
          left: 16px;
        }
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back-outside" aria-label="Back to portfolio">
      ← Back
    </a>

    <div class="container">
      <header class="site">Will Robinson Portfolio</header>

      <h1>Public Roads Magazine — A Trusted Resource</h1>

      <p class="lead">
        Editorial video highlighting the Federal Highway Administration’s
        quarterly publication, Public Roads, and its focus on the future of
        transportation, innovation, and STEM education.
      </p>

      <p class="meta"><strong>Role:</strong> Editor</p>

      <div class="video-wrapper">
        <div class="video-container">
          <iframe
            src="https://www.youtube.com/embed/W7GgylNmCI4?si=nMFbNRxTN65T1CIo"
            title="Public Roads Magazine Video"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>
  </body>
</html>
